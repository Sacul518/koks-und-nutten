<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Koks und Nutten — Admin</title>
  </head>
  <body>
    <main id="admin">
      <h1>Admin-Panel</h1>

      <form id="login-form">
        <input
          id="password-input"
          type="password"
          placeholder="Admin-Passwort"
          autocomplete="current-password"
        />
        <button id="login-button" type="submit">Anmelden</button>
        <p id="login-error"></p>
      </form>

      <section id="dashboard" hidden>
        <dl id="status-grid">
          <div><dt>Spieler</dt><dd id="stat-players">–</dd></div>
          <div><dt>Uptime</dt><dd id="stat-uptime">–</dd></div>
          <div><dt>Ticks/s</dt><dd id="stat-ticks">–</dd></div>
          <div><dt>Letzter Save</dt><dd id="stat-save">–</dd></div>
          <div><dt>Karten-Seed</dt><dd id="stat-seed">–</dd></div>
          <div><dt>Shutdown</dt><dd id="stat-shutdown">–</dd></div>
        </dl>

        <div id="actions">
          <button id="save-button" type="button">Jetzt speichern</button>
          <button id="shutdown-button" type="button" class="danger">Speichern &amp; Pi herunterfahren</button>
        </div>
        <p id="action-message"></p>
      </section>
    </main>

    <script type="module" src="/src/admin/admin.ts"></script>
  </body>
</html>
