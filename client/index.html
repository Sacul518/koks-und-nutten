<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Koks und Nutten</title>
  </head>
  <body>
    <div id="game"></div>

    <div id="join-overlay">
      <div id="join-box">
        <h1>Koks und Nutten</h1>
        <p class="subtitle">Baue dein Imperium auf.</p>
        <form id="join-form">
          <input
            id="name-input"
            type="text"
            maxlength="16"
            placeholder="Dein Name"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          />
          <button id="join-button" type="submit">Beitreten</button>
        </form>
        <p id="join-error"></p>
      </div>
    </div>

    <div id="hud" hidden>
      <div id="player-list"></div>

      <div id="stats">
        <div id="money-row"></div>
        <div id="inv-row"></div>
      </div>

      <button id="build-button" type="button">Bauen (B)</button>
      <button id="ledger-button" type="button">Personal (L)</button>

      <div id="toast" hidden></div>

      <div id="build-menu" hidden>
        <div class="panel-title">Bauen</div>
        <div id="build-options"></div>
        <button id="build-menu-close" class="panel-close" type="button">Abbrechen</button>
      </div>

      <div id="build-bar" hidden>
        <span id="build-bar-info"></span>
        <button id="build-confirm" type="button">Bauen</button>
        <button id="build-cancel" type="button">Abbrechen</button>
      </div>

      <div id="panel" hidden>
        <div id="panel-title" class="panel-title"></div>
        <div id="panel-body"></div>
        <div id="panel-actions"></div>
        <button id="panel-close" class="panel-close" type="button">Schließen</button>
      </div>

      <div id="controls-hint">Tippen = laufen/antippen &nbsp;·&nbsp; B = Bauen &nbsp;·&nbsp; L = Personal &nbsp;·&nbsp; WASD läuft &nbsp;·&nbsp; Shift = Sprint &nbsp;·&nbsp; C = zentrieren</div>
    </div>

    <div id="ledger" hidden>
      <div id="ledger-box">
        <div class="panel-title">Buchhaltung</div>
        <div id="ledger-period"></div>
        <table id="ledger-table"></table>
        <canvas id="ledger-chart"></canvas>
        <div id="ledger-chart-info"></div>
        <div class="panel-title">Personal</div>
        <div id="ledger-personal"></div>
        <button id="ledger-close" class="panel-close" type="button">Schließen</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
